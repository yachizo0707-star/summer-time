<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>夏休み大作戦</title>
<style>
:root{
  --bg:#0A1628;--surface:#142240;--surface2:#1A2D52;
  --gold:#FFD166;--gold-dim:#3D2E00;
  --green:#06D6A0;--green-dim:#003D2C;
  --red:#EF476F;--red-dim:#3D0017;
  --orange:#FF9F43;--orange-dim:#3D2000;
  --blue:#4CC9F0;
  --text:#E8F0FF;--text-sub:#7A90BB;--border:#1E3160;
  --radius:16px;
  --st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;padding-top:calc(var(--st));padding-bottom:calc(var(--sb) + 80px);
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.layer{position:relative;z-index:1;}
.nav-bar{display:flex;border-bottom:1px solid var(--border);
  background:rgba(10,22,40,0.95);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;padding-top:calc(var(--st));}
.nav-tab{flex:1;padding:12px 2px 10px;text-align:center;font-size:10px;font-weight:700;
  color:var(--text-sub);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;-webkit-appearance:none;font-family:inherit;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-icon{font-size:18px;display:block;margin-bottom:2px;}
.tab{display:none;padding:14px 12px;}
.tab.active{display:block;}
.card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:12px;border:1px solid var(--border);}
.today-hd{background:linear-gradient(135deg,#0F2A5E,#0A1628);border-radius:var(--radius);
  padding:18px 14px;margin-bottom:12px;border:1px solid #1E3F80;}
.today-date{font-size:12px;color:var(--text-sub);margin-bottom:3px;}
.today-title{font-size:22px;font-weight:900;color:var(--text);margin-bottom:10px;}
.cd-row{display:flex;gap:8px;}
.cd-item{background:rgba(255,209,102,0.12);border:1px solid var(--gold-dim);
  border-radius:10px;padding:8px;text-align:center;flex:1;}
.cd-num{font-size:24px;font-weight:900;color:var(--gold);line-height:1;}
.cd-label{font-size:9px;color:var(--text-sub);margin-top:2px;}
.club-banner{border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;
  display:flex;align-items:flex-start;gap:10px;}
.club-banner.has-club{background:var(--orange-dim);border:1px solid var(--orange);}
.club-banner.no-club{background:var(--green-dim);border:1px solid var(--green);}
.cb-icon{font-size:24px;flex-shrink:0;}
.cb-title{font-size:13px;font-weight:800;}
.has-club .cb-title{color:var(--orange);}
.no-club .cb-title{color:var(--green);}
.cb-sub{font-size:11px;color:var(--text-sub);margin-top:2px;line-height:1.5;}
.streak{background:linear-gradient(135deg,var(--gold-dim),#2A1A00);
  border:1px solid var(--gold);border-radius:var(--radius);
  padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.s-num{font-size:20px;font-weight:900;color:var(--gold);}
.s-label{font-size:11px;color:var(--text-sub);}
.sec-title{font-size:11px;font-weight:700;color:var(--text-sub);
  text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;}
.mission-card{background:var(--surface);border-radius:14px;padding:12px;
  margin-bottom:8px;border:1px solid var(--border);cursor:pointer;}
.mission-card.urg-red{border-color:var(--red);}
.mission-card.urg-orange{border-color:var(--orange);}
.mc-subj{font-size:10px;font-weight:700;color:var(--text-sub);margin-bottom:2px;}
.mc-name{font-size:13px;font-weight:800;color:var(--text);margin-bottom:4px;line-height:1.4;}
.mc-meta{font-size:11px;color:var(--text-sub);}
.utag{font-size:10px;font-weight:800;padding:1px 7px;border-radius:10px;display:inline-block;margin-left:4px;}
.utag.red{background:var(--red-dim);color:var(--red);}
.utag.orange{background:var(--orange-dim);color:var(--orange);}
.pb{margin-top:6px;}
.pb-bg{background:var(--border);border-radius:3px;height:5px;overflow:hidden;}
.pb-fill{height:100%;border-radius:3px;}
.pb-fill.green{background:linear-gradient(90deg,var(--green),#00B8FF);}
.pb-fill.orange{background:linear-gradient(90deg,var(--orange),var(--gold));}
.pb-fill.red{background:linear-gradient(90deg,var(--red),var(--orange));}
.pb-text{font-size:10px;color:var(--text-sub);margin-top:3px;display:flex;justify-content:space-between;}
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month{font-size:17px;font-weight:800;}
.cal-nav{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:6px 12px;font-size:14px;cursor:pointer;-webkit-appearance:none;min-height:36px;font-family:inherit;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--text-sub);padding:4px 0;}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;position:relative;
  background:var(--surface);border:1px solid transparent;}
.cal-day.other{opacity:0.2;}
.cal-day.is-today{border-color:var(--blue);color:var(--blue);}
.cal-day.has-dl{background:rgba(239,71,111,0.18);border-color:var(--red);}
.cal-day.has-club{background:rgba(255,159,67,0.15);border-color:var(--orange);}
.cal-day.both{background:linear-gradient(135deg,rgba(239,71,111,0.2),rgba(255,159,67,0.15));border-color:var(--red);}
.cal-day.summer{background:rgba(255,209,102,0.05);}
.cal-dn{font-size:12px;font-weight:700;}
.cal-dots{display:flex;gap:2px;margin-top:1px;}
.cal-dot{width:4px;height:4px;border-radius:50%;}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-sub);}
.leg-dot{width:7px;height:7px;border-radius:50%;}
.day-detail{background:var(--surface2);border-radius:12px;padding:12px;margin-top:10px;display:none;}
.day-detail.show{display:block;}
.dd-title{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:8px;}
.dd-ev{font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:7px;align-items:flex-start;}
.dd-ev:last-child{border-bottom:none;}
.dd-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.subj-sec{margin-bottom:18px;}
.subj-hd{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.subj-name{font-size:15px;font-weight:900;}
.subj-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;}
.badge-done{background:var(--green-dim);color:var(--green);}
.badge-prog{background:var(--orange-dim);color:var(--orange);}
.badge-new{background:var(--red-dim);color:var(--red);}
.task-card{background:var(--surface);border-radius:12px;padding:12px;
  margin-bottom:7px;border:1px solid var(--border);}
.task-card.done-c{opacity:0.5;border-color:var(--green-dim);}
.task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:8px;}
.task-name{font-size:13px;font-weight:800;line-height:1.4;}
.task-dl{font-size:10px;color:var(--text-sub);white-space:nowrap;}
.task-note{font-size:11px;color:var(--text-sub);margin-bottom:8px;line-height:1.5;}
.steps-wrap{display:flex;flex-direction:column;gap:5px;}
.step-item{display:flex;align-items:center;gap:8px;padding:7px 9px;
  border-radius:9px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);}
.step-item.sdone{background:var(--green-dim);border-color:var(--green);}
.step-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.step-item.sdone .step-chk{background:var(--green);border-color:var(--green);}
.step-lbl{font-size:12px;font-weight:600;}
.step-item.sdone .step-lbl{color:var(--text-sub);text-decoration:line-through;}
.pg-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
.pg-lbl{font-size:11px;color:var(--text-sub);white-space:nowrap;}
.pg-in{background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-size:15px;padding:7px 8px;width:70px;text-align:center;
  -webkit-appearance:none;outline:none;font-family:inherit;}
.pg-in:focus{border-color:var(--blue);}
.pg-btn{background:var(--blue);color:#000;border:none;border-radius:7px;
  padding:8px 12px;font-size:12px;font-weight:800;cursor:pointer;
  -webkit-appearance:none;min-height:36px;font-family:inherit;}
.pg-hint{font-size:11px;color:var(--blue);margin-top:5px;font-weight:600;}
.smart-hint{background:linear-gradient(135deg,rgba(6,214,160,0.12),rgba(76,201,240,0.08));
  border:1px solid rgba(6,214,160,0.3);border-radius:10px;
  padding:8px 10px;margin-top:7px;font-size:12px;color:var(--green);
  font-weight:600;line-height:1.7;}
.done-toggle{display:flex;align-items:center;gap:8px;padding:9px;
  background:var(--surface2);border-radius:9px;cursor:pointer;border:1px solid var(--border);}
.done-toggle.on{background:var(--green-dim);border-color:var(--green);}
.dt-icon{font-size:18px;}
.dt-lbl{font-size:12px;font-weight:700;}
.link-btn{display:block;width:100%;padding:12px;border-radius:10px;
  background:linear-gradient(135deg,#1D4ED8,#2563EB);color:#fff;
  text-align:center;font-size:14px;font-weight:800;text-decoration:none;
  margin-bottom:8px;border:none;cursor:pointer;font-family:inherit;
  -webkit-appearance:none;min-height:46px;letter-spacing:0.3px;}
.link-btn:active{opacity:0.85;}
.link-steps-done{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.rpt-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:12px;}
.rpt-hd{background:linear-gradient(135deg,#0F2A5E,#1A0A3D);padding:14px;border-bottom:1px solid var(--border);}
.rpt-hd-date{font-size:11px;color:var(--text-sub);margin-bottom:2px;}
.rpt-hd-title{font-size:17px;font-weight:900;color:var(--gold);}
.rpt-hd-sub{font-size:11px;color:var(--text-sub);margin-top:3px;}
.rpt-sec{padding:12px 14px;border-bottom:1px solid var(--border);}
.rpt-sec:last-child{border-bottom:none;}
.rpt-sec-lbl{font-size:10px;font-weight:800;color:var(--text-sub);
  text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;}
.rpt-done-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;
  border-bottom:1px solid var(--border);font-size:12px;}
.rpt-done-item:last-child{border-bottom:none;}
.rpt-rem-item{padding:7px 0;border-bottom:1px solid var(--border);}
.rpt-rem-item:last-child{border-bottom:none;}
.rpt-rem-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px;}
.rpt-rem-name{font-size:12px;font-weight:700;line-height:1.4;}
.rpt-rem-dl{font-size:10px;font-weight:700;white-space:nowrap;padding-top:1px;}
.rpt-rem-detail{font-size:11px;color:var(--text-sub);margin-top:2px;}
.rpt-perday{display:inline-block;background:rgba(76,201,240,0.18);color:var(--blue);
  font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px;margin-top:3px;}
.rpt-steps{margin-top:3px;}
.rpt-stag{display:inline-block;font-size:10px;background:var(--surface2);color:var(--text-sub);
  border:1px solid var(--border);border-radius:5px;padding:2px 6px;margin:2px 2px 2px 0;}
.rpt-stag.next{background:rgba(255,209,102,0.15);color:var(--gold);border-color:var(--gold-dim);}
.rpt-none{font-size:12px;color:var(--text-sub);padding:3px 0;}
.line-hint{background:linear-gradient(135deg,#003D1A,#001A0A);border:1px solid #00B900;
  border-radius:var(--radius);padding:14px;text-align:center;margin-bottom:12px;}
.line-icon{font-size:28px;margin-bottom:6px;}
.line-text{font-size:14px;font-weight:800;color:#00E033;margin-bottom:3px;}
.line-sub{font-size:11px;color:var(--text-sub);}
.toast{position:fixed;bottom:calc(var(--sb) + 86px);left:12px;right:12px;
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:12px 14px;border-radius:var(--radius);font-size:13px;font-weight:700;
  text-align:center;z-index:800;transform:translateY(120px);transition:transform 0.3s ease;pointer-events:none;}
.toast.show{transform:translateY(0);}
.cov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);
  z-index:1000;-webkit-box-align:center;align-items:center;justify-content:center;flex-direction:column;}
.cov.show{display:-webkit-flex;display:flex;}
.cov-box{text-align:center;}
.cov-stars{font-size:36px;letter-spacing:4px;margin-bottom:10px;}
.cov-text{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:4px;}
.cov-sub{font-size:13px;color:var(--text-sub);margin-bottom:16px;}
.cov-btn{background:var(--gold);color:#1A1000;border:none;border-radius:12px;
  padding:12px 26px;font-size:15px;font-weight:800;cursor:pointer;-webkit-appearance:none;font-family:inherit;}
.pt-pop{position:fixed;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  background:var(--gold);color:#1A1000;font-size:14px;font-weight:900;
  padding:7px 18px;border-radius:18px;z-index:900;pointer-events:none;
  -webkit-animation:ptF 1.4s ease forwards;animation:ptF 1.4s ease forwards;}
@-webkit-keyframes ptF{0%{bottom:120px;opacity:1;}100%{bottom:190px;opacity:0;}}
@keyframes ptF{0%{bottom:120px;opacity:1;}100%{bottom:190px;opacity:0;}}
.empty{text-align:center;color:var(--text-sub);font-size:13px;padding:20px 0;}
</style>
</head>

    body+='<div class="dt-icon">'+(d3?'✅':'⬜')+'</div>';
    body+='<div class="dt-lbl">'+(d3?'完了！':'完了したらタップ')+'</div></div>';
  } else if(m.type==='link'){
    var sd2=getSD(m);
    body='<a href="'+m.url+'" target="_blank" class="link-btn">🔍 英語たんけん隊を開く</a>';
    body+='<div class="link-steps-done">';
    for(var li=0;li<m.steps.length;li++){
      var ld=sd2.indexOf(li)>=0;
      body+='<div class="step-item'+(ld?' sdone':'')+'" onclick="tapStep(\''+m.id+'\','+li+')" style="cursor:pointer;">';
      body+='<div class="step-chk">'+(ld?'✓':'')+'</div>';
      body+='<div class="step-lbl">'+m.steps[li]+'</div></div>';
    }
    body+='</div>';
  }
  var h='<div class="task-card'+(done?' done-c':'')+'" id="tc-'+m.id+'">';
  h+='<div class="task-top"><div class="task-name">'+m.name+'</div>';
  h+='<div class="task-dl" style="color:'+dlc+'">'+dlT+'<span style="font-size:10px;">'+m.dll+'</span></div></div>';
  if(m.note)h+='<div class="task-note">📝 '+m.note+'</div>';
  h+=body+'</div>';
  return h;
}
function bindTaskEv(){}
function renderReport(){
  var ts=todayStr();
  var dH='';
  for(var i=0;i<MSNS.length;i++){
    var m=MSNS[i];
    if(m.type==='pages'&&getPD(m)>0){
      var t=getTotal(m),p=getPD(m),pct=Math.min(100,Math.round(p/t*100));
      dH+='<div class="rpt-done-item"><div>📖</div><div>'+m.subj+'「'+m.name+'」'+p+'P完了（'+pct+'%）</div></div>';
    } else if(m.type==='steps'&&getSD(m).length>0){
      dH+='<div class="rpt-done-item"><div>✅</div><div>'+m.subj+'「'+m.name+'」ステップ'+getSD(m).length+'/'+m.steps.length+'</div></div>';
    } else if(m.type==='done'&&getTask(m.id).done){
      dH+='<div class="rpt-done-item"><div>🎉</div><div>'+m.subj+'「'+m.name+'」完了！</div></div>';
    }
  }
  if(!dH)dH='<div class="rpt-none">まだ記録なし。ミッションタブからやったことを入力しよう！</div>';
  var rem=[],allD=true;
  for(var j=0;j<MSNS.length;j++){if(!isDone(MSNS[j])){rem.push(MSNS[j]);allD=false;}}
  rem.sort(function(a,b){return dBetween(ts,a.dl)-dBetween(ts,b.dl);});
  var rH='';
  for(var ri=0;ri<rem.length;ri++){
    var rm=rem[ri],dl=dBetween(ts,rm.dl);
    var dc=dl<=3?'var(--red)':dl<=7?'var(--orange)':'var(--text-sub)';
    var det='';
    if(rm.type==='pages'){
      var lft=getLeft(rm),ppd=getPerDay(rm);
      det='<div class="rpt-rem-detail">残り'+lft+'P ／ あと'+dl+'日</div><span class="rpt-perday">→ 1日'+ppd+'Pずつやれば間に合う！</span>';
    } else if(rm.type==='steps'){
      var doneC=getSD(rm).length,nextS=rm.steps.slice(doneC);
      det='<div class="rpt-rem-detail">残りステップ'+(rm.steps.length-doneC)+'個 ／ あと'+dl+'日</div><div class="rpt-steps">';
      for(var ni=0;ni<nextS.length&&ni<3;ni++)det+='<span class="rpt-stag'+(ni===0?' next':'')+'">'+nextS[ni]+'</span>';
      det+='</div>';
    } else {det='<div class="rpt-rem-detail">あと'+dl+'日</div>';}
    rH+='<div class="rpt-rem-item"><div class="rpt-rem-top"><div class="rpt-rem-name">'+rm.subj+'「'+rm.name+'」</div><div class="rpt-rem-dl" style="color:'+dc+'">'+rm.dll+'</div></div>'+det+'</div>';
  }
  if(!rH)rH='<div class="rpt-none">🎉 全部の宿題が終わった！</div>';
  var h='<div class="rpt-wrap"><div class="rpt-hd"><div class="rpt-hd-date">'+fmtJP(ts)+'</div><div class="rpt-hd-title">📋 今日の勉強レポート</div><div class="rpt-hd-sub">🔥 '+state.streak+'日連続チェック中！</div></div><div class="rpt-sec"><div class="rpt-sec-lbl">✨ 今日やったこと</div>'+dH+'</div><div class="rpt-sec"><div class="rpt-sec-lbl">📌 残りの宿題</div>'+rH+'</div></div>';
  if(allD)h+='<div style="background:linear-gradient(135deg,var(--green-dim),#001A10);border:1px solid var(--green);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:12px;"><div style="font-size:36px;">🏆</div><div style="font-size:15px;font-weight:900;color:var(--green);">全ミッションコンプリート！！</div></div>';
  h+='<div class="line-hint"><div class="line-icon">📱</div><div class="line-text">スクショしてLINEで送ろう！</div><div class="line-sub">ホームボタン＋電源ボタン → LINEで共有</div></div>';
  document.getElementById('reportContent').innerHTML=h;
}
load();
try{initStars();}catch(e){}
renderToday();
renderCal();
</script>
